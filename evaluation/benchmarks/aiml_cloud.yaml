- metadata:
    benchmark_type: manually_curated
    created_from: research_corpus
    version: "1.0"
    notes: >
      Queries span embedding-enhanced search, prompt engineering for sentiment,
      LLM hallucination perception, efficient vision models, and generative
      topology optimisation. Queries use category-level phrasing rather than
      model brand names to stress-test semantic retrieval.

- query: "How can word embeddings enhance keyword search in relational databases?"
  expected_docs:
    - "Enhancing_Keyword_Search_in_Relational_Databases_With_Word_Embeddings.pdf"
  query_type: entity_relationship
  domain: aiml_cloud

- query: "What prompt engineering strategies improve zero-shot sentiment classification for financial text?"
  expected_docs:
    - "Enhancing_Zero-Shot_Crypto_Sentiment_With_Fine-Tuned_Language_Model_and_Prompt_Engineering.pdf"
  query_type: procedural
  domain: aiml_cloud

- query: "How do users perceive and respond to false or hallucinated content generated by language models?"
  expected_docs:
    - "Fool_Me_Fool_Me_User_Attitudes_Toward_LLM_Falsehoods.pdf"
  query_type: analytical
  domain: aiml_cloud

- query: "What architectural modifications have been proposed to improve skin lesion classification using deep learning models?"
  expected_docs:
    - "Soft_Attention_Based_Efficientnetv2b3_Model_for_Skin_Cancers_Disease_Classification_Using_Dermoscopy_Images.pdf"
  query_type: entity_relationship
  domain: aiml_cloud

- query: "How can generative models support optimization tasks involving competing engineering objectives?"
  expected_docs:
    - "Variational_Autoencoder-Based_Multiobjective_Topology_Optimization_of_Electrical_Machines_Using_Vector_Graphics.pdf"
  query_type: multi_hop
  domain: aiml_cloud
