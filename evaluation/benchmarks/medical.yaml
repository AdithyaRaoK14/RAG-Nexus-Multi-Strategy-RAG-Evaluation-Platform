- metadata:
    benchmark_type: manually_curated
    created_from: research_corpus
    version: "1.0"
    notes: >
      Queries cover oral SCC histopathology classification, grading, and
      feature fusion methods. Written to avoid model name leakage (AlexNet,
      EsccNet) in the query string; tests whether retrieval generalises to
      semantic medical concepts rather than keyword-matching paper titles.

- query: "What deep learning approaches have been proposed for oral squamous cell carcinoma classification?"
  expected_docs:
    - "Automated_Grading_of_Oral_Squamous_Cell_Carcinoma_into_Multiple_Classes_Using_Deep_Learning_Methods.pdf"
    - "Histopathological_Image_Based_Oral_Squamous_Cell_Carcinoma_Classification_Using_Deep_Network_Fusion.pdf"
    - "Ensemble_Deep_Learning_Framework_for_Oral_Squamous_Cell_Carcinoma_OSCC_Classification_Using_Modified_VGG_and_CNN_Features_with_XGBoost.pdf"
  query_type: simple
  domain: medical

- query: "What CNN architectures have been applied to histopathological classification of oral squamous cell carcinoma?"
  expected_docs:
    - "Classification_of_Oral_Squamous_Carcinoma_Histopathological_images_using_Alex_Net.pdf"
  query_type: entity_relationship
  domain: medical

- query: "What methods are used for automated grading of oral SCC into severity classes?"
  expected_docs:
    - "Automated_Grading_of_Oral_Squamous_Cell_Carcinoma_into_Multiple_Classes_Using_Deep_Learning_Methods.pdf"
  query_type: procedural
  domain: medical

- query: "How are self-attention based architectures applied to tumour margin delineation in histopathology slides?"
  expected_docs:
    - "Squamous_Cell_Carcinoma_Margin_Classification_Using_Vision_Transformers_from_Digital_Histopathology_Images.pdf"
  query_type: entity_relationship
  domain: medical

- query: "What hybrid architectures combine convolutional and attention mechanisms for whole-slide image classification in esophageal cancer?"
  expected_docs:
    - "EsccNet_A_Hybrid_CNN_and_Transformers_Model_for_the_Classification_of_Whole_Slide_Images_of_Esophageal_Squamous_Cell_Carcinoma.pdf"
  query_type: multi_hop
  domain: medical

- query: "Compare CNN-based and Transformer-based approaches for SCC image analysis."
  expected_docs:
    - "Classification_of_Oral_Squamous_Carcinoma_Histopathological_images_using_Alex_Net.pdf"
    - "Squamous_Cell_Carcinoma_Margin_Classification_Using_Vision_Transformers_from_Digital_Histopathology_Images.pdf"
    - "EsccNet_A_Hybrid_CNN_and_Transformers_Model_for_the_Classification_of_Whole_Slide_Images_of_Esophageal_Squamous_Cell_Carcinoma.pdf"
  query_type: analytical
  domain: medical

- query: "How are lightweight efficient CNN backbones used for lung carcinoma grading with classical classifiers?"
  expected_docs:
    - "LungCarcinoGrade-EffNetSVM_A_Novel_Approach_to_Lung_Carcinoma_Grading_using_EfficientNetB0_and_Support_Vector_Machine.pdf"
  query_type: entity_relationship
  domain: medical

- query: "What feature fusion techniques are used for oral SCC classification in histopathological images?"
  expected_docs:
    - "Histopathological_Image_Based_Oral_Squamous_Cell_Carcinoma_Classification_Using_Deep_Network_Fusion.pdf"
    - "Ensemble_Deep_Learning_Framework_for_Oral_Squamous_Cell_Carcinoma_OSCC_Classification_Using_Modified_VGG_and_CNN_Features_with_XGBoost.pdf"
  query_type: analytical
  domain: medical
