- metadata:
    benchmark_type: manually_curated
    created_from: research_corpus
    difficulty: hard
    version: "1.0"
    notes: >
      Hard queries require cross-paper synthesis on RAG architecture trade-offs,
      memory, security, and evaluation. No system acronyms or paper-specific
      terminology present in queries.

- query: "How do query transformation methods interact with retrieval stages to improve downstream answer quality in open-domain QA?"
  expected_docs:
